<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이브 코딩 갤러리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        /* 왼쪽 학생 리스트 */
        #sidebar { width: 250px; background: #f4f4f4; border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; flex-shrink: 0; }
        #sidebar h2 { font-size: 1.2em; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .student-link { display: block; padding: 10px; color: #333; text-decoration: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .student-link:hover { background: #e0e0e0; }
        .student-link.active { background: #007bff; color: white; font-weight: bold; }
        /* 오른쪽 실행 화면 */
        #content-area { flex-grow: 1; display: flex; flex-direction: column; background: white; }
        #app-header { padding: 15px 20px; border-bottom: 1px solid #ddd; background: #fff; z-index: 10; }
        #app-header h1 { margin: 0; font-size: 1.3em; color: #007bff; }
        #app-header p { margin: 5px 0 0; font-size: 0.9em; color: #666; }
        #viewer-frame { flex-grow: 1; border: none; width: 100%; height: 100%; }
        .placeholder { display: flex; justify-content: center; align-items: center; height: 100%; color: #888; flex-direction: column; gap: 10px;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🚀 작품 목록</h2>
        <div id="student-list">
            </div>
    </div>

    <div id="content-area">
        <div id="app-header">
            <h1 id="current-student">작품을 선택하세요</h1>
            <p id="app-description">왼쪽 목록에서 친구의 이름을 클릭하면 웹앱이 여기에 실행됩니다.</p>
        </div>
        
        <div id="iframe-container" style="flex-grow: 1;">
            <div class="placeholder" id="placeholder-text">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span>이곳에 친구의 작품이 나타납니다.</span>
            </div>
            <iframe id="viewer-frame" style="display:none;"></iframe>
        </div>
    </div>

    <script src="student_codes.js"></script>

    <script>
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('student-list');
            const iframe = document.getElementById('viewer-frame');
            const placeholder = document.getElementById('placeholder-text');
            const headerName = document.getElementById('current-student');

            // 1. studentData (student_codes.js에 정의됨)를 기반으로 리스트 생성
            studentData.forEach((student, index) => {
                const a = document.createElement('a');
                a.classList.add('student-link');
                a.textContent = `${student.id}. ${student.name} - ${student.appName}`;
                a.onclick = () => loadApp(index, a);
                listContainer.appendChild(a);
            });

            // 2. 앱 로드 함수
            function loadApp(index, element) {
                const data = studentData[index];
                
                // 링크 활성화 스타일 전역 초기화 및 현재 것만 적용
                document.querySelectorAll('.student-link').forEach(el => el.classList.remove('active'));
                element.classList.add('active');

                // 헤더 업데이트
                headerName.textContent = `${data.id}. ${data.name}의 ${data.appName}`;

                // iframe에 HTML 코드 주입 및 실행
                placeholder.style.display = 'none';
                iframe.style.display = 'block';
                
                // 핵심 logic: iframe의 document를 열어 코드를 쓰고 닫음으로써 완전한 웹페이지로 렌더링
                const iframeDoc = iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(data.code);
                iframeDoc.close();
            }
        });
    </script>
</body>
</html>
